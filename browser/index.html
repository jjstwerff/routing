<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1f2933">
<title>routing — Enschede base map</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100vh; height: 100dvh; overflow: hidden; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
  /* full-bleed canvas — a <canvas> is a replaced element, so it needs explicit width/height (not just inset:0). */
  #map { position: absolute; inset: 0; width: 100%; height: 100%; display: block; background: #f2efe9; cursor: grab; }
  #hud { position: fixed; left: 8px; top: calc(8px + env(safe-area-inset-top)); z-index: 10; background: rgba(31,41,51,.82); color: #fff;
         padding: 5px 9px; border-radius: 8px; font: 12px/1.4 ui-monospace, monospace; white-space: pre; pointer-events: none; }
  #attr { position: fixed; right: 0; bottom: 0; z-index: 10; background: rgba(255,255,255,.7); color: #333;
          padding: 1px 6px; font: 11px/1.4 system-ui, sans-serif; border-top-left-radius: 5px; }
  #attr a { color: #2b6cff; }
</style>
</head>
<body>
<canvas id="map" aria-label="Enschede base map"></canvas>
<div id="hud">loading…</div>
<div id="attr">© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors</div>
<script type="module">
import { RouteMap } from './map.mjs';
import { TileLoader } from './tiles.mjs';

const map = new RouteMap(document.getElementById('map'), { lat: 52.27, lon: 6.90, zoom: 13 });
window.__map = map;
const hud = document.getElementById('hud');
map.onRender(() => {
  const s = map._stats || {}, t = window.__tiles;
  hud.textContent =
    `drag to pan · wheel to zoom   z${map.camera.zoom.toFixed(1)}\n` +
    `tiles ${t ? t.loaded : 0}/${t && t.index ? t.index.keys.length : 0} in view\n` +
    `${s.areas || 0}A ${s.buildings || 0}B ${s.streets || 0}S ${s.lines || 0}L ${s.pois || 0}P`;
});

(async () => {
  try {
    const loader = new TileLoader(map, 'tiles');
    await loader.start();                       // fits the region, loads the visible working set
    window.__tiles = loader;
    window.__m4 = { total: loader.index.keys.length, loaded: loader.loaded };
    map.render();
  } catch (e) {
    window.__m4 = { error: String(e) };
    hud.textContent = 'no tiles — run: node browser/bake_tiles.mjs\n' + e;
  }
})();
</script>
</body>
</html>
