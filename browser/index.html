<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>routing — standalone store app</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; font: 13px system-ui, sans-serif; }
  #map { display: block; width: 100vw; height: 100vh; cursor: crosshair; background: #f2efe9; }
  #hud { position: fixed; left: 8px; top: 8px; max-width: 90vw; background: rgba(255,255,255,.88);
         padding: 4px 8px; border-radius: 4px; box-shadow: 0 1px 3px rgba(0,0,0,.2); color: #333; }
  /* Touch has no double-click, so a selected point gets an explicit Delete (DESIGN.md §1). */
  #rough-delete { position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%);
                  background: #f04438; color: #fff; border: 0; border-radius: 6px; padding: 10px 18px;
                  font: 600 14px system-ui, sans-serif; box-shadow: 0 2px 8px rgba(0,0,0,.3); cursor: pointer; }
  #rough-delete.hidden { display: none; }
  /* A bulk delete is the one risky edit, so the phone gets a brief one-tap way back (DESIGN.md §1);
     single moves and inserts are self-correcting and get no chrome. */
  #undo-snackbar { position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%);
                   background: rgba(32,32,32,.94); color: #fff; border-radius: 6px; padding: 8px 12px;
                   font: 14px system-ui, sans-serif; box-shadow: 0 2px 8px rgba(0,0,0,.4);
                   display: flex; align-items: center; gap: 6px; }
  #undo-snackbar.hidden { display: none; }
  #undo-snackbar button { background: none; border: 0; color: #7fb0ff; font: 600 14px system-ui, sans-serif;
                          cursor: pointer; padding: 2px 4px; }
  /* Shift+drag rubber band (desktop). Transient chrome, so it is a DOM element rather than a canvas draw. */
  #select-box { position: fixed; border: 1px solid #2b6cff; background: rgba(43,108,255,.12);
                pointer-events: none; }
  #select-box.hidden { display: none; }
</style>
<canvas id="map"></canvas>
<div id="hud">loading…</div>
<button id="rough-delete" class="hidden">Delete point</button>
<div id="undo-snackbar" class="hidden"><span id="undo-snack-label"></span><button id="undo-snack-btn" type="button">Undo</button></div>
<div id="select-box" class="hidden"></div>
<script type="module" src="./store-app.mjs"></script>
