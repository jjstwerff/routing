name: pages

# Publish the serverless app to GitHub Pages. The whole build is now DECLARED in loft.toml (@PLN100 build
# phase): `loft build` runs the fingerprinted `standalone` + `pages-site` assets to produce _site/index.html
# (the single self-contained page — wasm + test set + presentation layers + Leaflet, all inlined). No
# hand-orchestrated build steps here; the manifest is the source of truth.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  # The build phase (@PLN100) is not yet on loft's default branch. PIN loft to the feature branch that has
  # it; drop this back to HEAD (see ci.yml) once @PLN100 merges to loft main.
  LOFT_REF: tuxedo-pln100-build-phase

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System deps (mold)
        run: sudo apt-get update && sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No public loft binary yet — build it from source (the @PLN100 build-phase branch), cached on its sha.
      - name: Resolve loft revision
        id: loft
        run: echo "sha=$(git ls-remote https://github.com/loft-lang/loft "$LOFT_REF" | cut -f1)" >> "$GITHUB_OUTPUT"
      - name: Clone loft
        run: git clone --depth=1 --branch "$LOFT_REF" https://github.com/loft-lang/loft /tmp/loft
      - name: Cache cargo + loft build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/loft/target
          key: loft-${{ runner.os }}-${{ steps.loft.outputs.sha }}
          restore-keys: |
            loft-${{ runner.os }}-
      - name: Build loft toolchain
        run: |
          cd /tmp/loft
          cargo build --release --bin loft
          echo "LOFT_BIN=/tmp/loft/target/release/loft" >> "$GITHUB_ENV"
          echo "LOFT_ROOT=/tmp/loft" >> "$GITHUB_ENV"

      # One command: the loft.toml assets build the wasm + presentation layers, inline the standalone, and
      # assemble _site/. Fingerprinted, so a warm cache rebuilds only what changed.
      - name: loft build → _site
        run: "$LOFT_BIN build --lib lib"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
