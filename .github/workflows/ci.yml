name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # loft builds with the mold linker; the test harnesses use `fuser` (psmisc)
      # to free the server port, node (global WebSocket) for the WS clients, and
      # wasmtime for the wasm parity gate.
      - name: System deps (mold, psmisc)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold psmisc

      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2, wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No public loft binary release yet — build it from source (its default/
      # lib resolves relative to the binary). Cache keyed on loft's HEAD so repeat
      # runs reuse the compiled toolchain.
      - name: Resolve loft revision
        id: loft
        run: echo "sha=$(git ls-remote https://github.com/loft-lang/loft HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Clone loft
        run: git clone --depth=1 https://github.com/loft-lang/loft /tmp/loft

      - name: Cache cargo + loft build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/loft/target
          key: loft-${{ runner.os }}-${{ steps.loft.outputs.sha }}
          restore-keys: |
            loft-${{ runner.os }}-

      - name: Build loft toolchain
        run: |
          cd /tmp/loft
          cargo build --release --bin loft
          # loft --native-wasm links libloft.rlib built for wasip2 (no default features:
          # mmap/threading aren't wasm-safe) — needed by the wasm client + `make test-wasm`.
          cargo build --release --target wasm32-wasip2 --lib --no-default-features --features random
          echo "LOFT=/tmp/loft/target/release/loft" >> "$GITHUB_ENV"
          echo "LOFT_ROOT=/tmp/loft" >> "$GITHUB_ENV"   # harnesses' --path (default/ + wasip2 rlib)

      # --- build binaries ---
      - name: Build native server binary
        run: make build

      - name: Build wasm client
        run: $LOFT --native-wasm client/kernel.wasm --path /tmp/loft/ --lib lib client/kernel.loft

      # --- gates ---
      - name: Offline test gates (kernel + server harnesses)
        run: make test

      - name: WASM parity gate (interpret == native-wasm)
        run: make test-wasm

      # --- artifacts ---
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: routing-binaries-${{ github.sha }}
          path: |
            dist/routing-server-bin
            client/kernel.wasm
          if-no-files-found: error
