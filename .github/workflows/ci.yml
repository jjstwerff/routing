name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # loft builds with the mold linker; the test harnesses use `fuser` (psmisc)
      # to free the server port, node (global WebSocket) for the WS clients, and
      # wasmtime for the wasm parity gate.
      - name: System deps (mold, psmisc)
        run: |
          sudo apt-get update
          sudo apt-get install -y mold psmisc

      - name: Install wasmtime
        uses: bytecodealliance/actions/wasmtime/setup@v1

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2, wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No public loft binary release yet — build it from source (its default/
      # lib resolves relative to the binary). Cache keyed on loft's HEAD so repeat
      # runs reuse the compiled toolchain.
      - name: Resolve loft revision
        id: loft
        run: echo "sha=$(git ls-remote https://github.com/loft-lang/loft HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - name: Clone loft
        run: git clone --depth=1 https://github.com/loft-lang/loft /tmp/loft

      - name: Cache cargo + loft build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/loft/target
          key: loft-${{ runner.os }}-${{ steps.loft.outputs.sha }}
          restore-keys: |
            loft-${{ runner.os }}-

      - name: Build loft toolchain
        run: |
          cd /tmp/loft
          cargo build --release --bin loft
          # loft --native-wasm links libloft.rlib built for wasip2 (no default features:
          # mmap/threading aren't wasm-safe) — needed by the wasm client + `make test-wasm`.
          cargo build --release --target wasm32-wasip2 --lib --no-default-features --features random
          echo "LOFT=/tmp/loft/target/release/loft" >> "$GITHUB_ENV"
          echo "LOFT_ROOT=/tmp/loft" >> "$GITHUB_ENV"   # harnesses' --path (default/ + wasip2 rlib)

      # --- build binaries ---
      - name: Build native server binary
        run: make build

      - name: Build wasm client
        run: $LOFT --native-wasm client/kernel.wasm --path /tmp/loft/ --lib lib client/kernel.loft

      # --- gates ---
      - name: Offline test gates (kernel + server harnesses)
        run: make test

      # Non-blocking: the wasm CLIENT build above already proves --native-wasm compiles.
      # This RUNS the wasm under wasmtime for interpret-parity, but loft #518's stack-overflow
      # guard spawns a "main-stack" thread wasip2 can't create, so every --native-wasm program
      # aborts at runtime (wasmtime 43 AND 46 — not a version issue). Tracked: loft-lang/loft#521.
      # Re-make this blocking once #521 lands (gate the thread-spawn to non-wasm targets).
      - name: WASM parity gate (interpret == native-wasm) — informational (loft#521)
        continue-on-error: true
        run: make test-wasm

      # --- artifacts ---
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: routing-binaries-${{ github.sha }}
          path: |
            dist/routing-server-bin
            client/kernel.wasm
          if-no-files-found: error

  # --- GitHub Pages: build the self-contained browser app, and DEPLOY it from main ------------------
  # The whole Pages build is DECLARED in loft.toml (@PLN100 build phase): `loft build` runs the
  # fingerprinted `standalone` + `pages-site` assets → _site/index.html (wasm + presentation layers +
  # Leaflet, all inlined). This job VERIFIES that build on every push/PR; the deploy job below only
  # publishes from main. No hand-orchestrated build steps — the manifest is the source of truth.
  pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System deps (mold)
        run: sudo apt-get update && sudo apt-get install -y mold

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # No public loft binary — build loft HEAD from source (it now carries @PLN100's `loft build`,
      # merged as loft-lang/loft#531), cached on its sha and shared with the build-test loft cache.
      - name: Resolve loft revision
        id: loft
        run: echo "sha=$(git ls-remote https://github.com/loft-lang/loft HEAD | cut -f1)" >> "$GITHUB_OUTPUT"
      - name: Clone loft
        run: git clone --depth=1 https://github.com/loft-lang/loft /tmp/loft
      - name: Cache cargo + loft build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            /tmp/loft/target
          key: loft-${{ runner.os }}-${{ steps.loft.outputs.sha }}
          restore-keys: |
            loft-${{ runner.os }}-
      - name: Build loft toolchain
        run: |
          cd /tmp/loft
          cargo build --release --bin loft
          echo "LOFT_BIN=/tmp/loft/target/release/loft" >> "$GITHUB_ENV"
          echo "LOFT_ROOT=/tmp/loft" >> "$GITHUB_ENV"

      # One command: the loft.toml assets build the wasm + presentation layers, inline the standalone,
      # and assemble _site/. Runs on push AND PR, so a broken browser build fails the PR.
      - name: loft build → _site
        run: "$LOFT_BIN build --lib lib"

      # Publish the artifact only from main; PRs just prove the build above succeeds.
      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write        # deploy-pages needs these; build-test/pages keep contents:read only
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages-deploy       # never cancel a live deploy mid-flight (separate from ci-${ref})
      cancel-in-progress: false
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
