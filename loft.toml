[package]
name    = "routing"
version = "0.0.0"
loft    = ">=0.8"

# All loft deps are provided locally via `--lib lib` at build time (see tools/ scripts):
#   lib/routing_kernel — our pure-loft compute
#   lib/basemap        — the presentation-layer kernel (grid + classifiers + DP)
#   lib/server, lib/web — vendored from the registry with a one-line compile fix
#     (`try_recv`/`next` return `text?`, not `text`; see docs/loft-feedback.md).

# The GitHub Pages app is the loft-free canvas base-map viewer (PLAN-MAP): `node browser/build-site.mjs`
# bakes the tile pyramid + inlines the renderer into _site/. It needs no loft build, so there is no
# [build]/[library] section here. The routing kernels/server (native + wasi) still build via the Makefile.
