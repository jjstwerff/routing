<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Phone-first: fill the device, lock page zoom so pinch drives the map, not the page. -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1f2933">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>routing — sketch a route</title>

  <!-- Vendored Leaflet (no CDN): pure static files, so the app drops into a phone browser
       and can be served whole by the Mode B loft server. See DESIGN.md §3. -->
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Full-bleed map is the whole UI for now; the HUD grows in later steps. -->
  <div id="map" aria-label="Route map"></div>

  <!-- Instant rough length (DESIGN.md §1): updates every frame as you tap and drag. -->
  <div id="length-readout" class="hud-readout" role="status" aria-live="polite">0 m</div>

  <!-- Matched-route length (PLAN step 7): the geodesic length of the server's map-matched route. -->
  <div id="server-length" class="hud-subreadout" role="status" aria-live="polite">matched —</div>

  <!-- Optional goal length (PLAN step 14): feedback only — drives the ±delta, never reshapes. -->
  <div id="goal-bar" class="hud-goal">
    <label>goal <input id="goal-km" type="number" min="0" step="0.5" inputmode="decimal" placeholder="—"> km</label>
  </div>

  <!-- Touch delete affordance: shown only while a rough point is selected (see rough.js).
       Mouse users can also double-click a point, or press Delete/Backspace. -->
  <button id="rough-delete" class="hud-btn hud-btn--danger hidden" type="button"
          aria-label="Delete selected point">Delete point</button>

  <!-- Activity × sub-mode (PLAN step 8): the match profile + Waymarkedtrails overlay (see controls.js). -->
  <div id="controls" class="hud-controls">
    <select id="activity" aria-label="Activity"></select>
    <select id="submode" aria-label="Sub-mode"></select>
  </div>

  <!-- GPX export/import (PLAN steps 10/11, see gpx.js). -->
  <div id="gpx-bar" class="hud-gpx">
    <button id="gpx-export" type="button">Export GPX</button>
    <label class="gpx-import" title="Import a .gpx track">Import GPX
      <input id="gpx-import" type="file" accept=".gpx,application/gpx+xml" hidden>
    </label>
  </div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="geo.js"></script>
  <script src="rough.js"></script>
  <script src="app.js"></script>
  <script src="ws.js"></script>
  <script src="controls.js"></script>
  <script src="gpx.js"></script>
  <script src="undo.js"></script>
</body>
</html>
